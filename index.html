<!--
  ROP evidence deck (EQT-screenshot style). Single-file app.
  Local sanity:  python3 -m http.server 8765   (open http://localhost:8765/deck/)
  Validate:      node scripts/validate_deck.mjs
  Data:          fetch data/deck_data.json, fall back to data/deck_data_STUB.json
  NO CDN at runtime except Google Fonts (local font stack fallback included).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<script src="vendor/chart.umd.js"></script>

<style>
  :root {
    --navy:#00294b; --navy2:#003a66; --blue:#005f9e; --blue2:#0075b5;
    --teal:#007e6c; --teall:#75d9d7; --magenta:#a6256e; --warm:#ebe0da;
    --bgblue:#def5ff; --bgteal:#ddf6f6; --gray:#6b7f8a; --gray1:#f1f1f1;
    --serif:"Source Serif 4", Georgia, "Times New Roman", serif;
    --sans:"Inter", -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { background:#eef0f3; font-family:var(--sans); color:var(--navy);
         -webkit-font-smoothing:antialiased; }

  .stage { position:fixed; inset:0; display:flex; align-items:center;
           justify-content:center; overflow:hidden; }
  .deck  { position:relative; width:1440px; height:900px; background:#fff;
           box-shadow:0 8px 40px rgba(0,41,75,0.18); overflow:hidden;
           transform-origin:center center; flex-shrink:0; }

  .slide { position:absolute; inset:0; opacity:0; pointer-events:none;
           transition:opacity .28s ease; padding:38px 46px 34px; }
  .slide.active { opacity:1; pointer-events:auto; }

  /* ---------- header ---------- */
  .s-head { display:flex; justify-content:space-between; align-items:flex-start;
            gap:24px; border-bottom:2px solid var(--navy); padding-bottom:14px; }
  .s-head .lhs { flex:1; display:flex; gap:14px; align-items:flex-start; }
  .s-badge { flex:none; width:34px; height:34px; border-radius:50%;
             background:var(--navy); color:#fff; font-weight:700; font-size:16px;
             display:flex; align-items:center; justify-content:center; margin-top:2px; }
  .s-claim { font-family:var(--serif); font-weight:600; font-size:23px;
             line-height:1.28; color:var(--navy); letter-spacing:-.1px; }
  .s-claim u { text-decoration:none; border-bottom:2px solid var(--navy);
               padding-bottom:1px; }
  .chips { flex:none; display:flex; flex-direction:column; gap:5px; align-items:flex-end; }
  .chip  { font-size:11px; font-weight:600; letter-spacing:.4px; text-transform:uppercase;
           padding:4px 11px; border-radius:3px; white-space:nowrap; }
  .chip.main { background:var(--navy); color:#fff; }
  .chip.sub  { background:var(--bgblue); color:var(--navy2); }

  /* ---------- panel grid ---------- */
  .panels { display:flex; gap:16px; margin-top:20px; height:648px; }
  .panels.cols-1 > .panel { flex:1; }
  .panels.cols-2 > .panel { flex:1; }
  .panels.cols-3 > .panel { flex:1; }
  .panel { border:1px solid #00294b22; border-radius:4px; background:#fff;
           display:flex; flex-direction:column; overflow:hidden; }
  .panel .take { background:var(--bgblue); color:var(--navy2); font-size:13px;
                 line-height:1.4; padding:9px 12px; border-bottom:1px solid #00294b18; }
  .panel .take b { color:var(--navy); font-weight:700; }
  .panel .ptitle { font-size:12px; font-weight:600; text-transform:uppercase;
                   letter-spacing:.6px; color:var(--gray); text-align:center;
                   padding:10px 8px 2px; }
  .panel .pbody { flex:1; position:relative; padding:8px 12px 12px;
                  min-height:0; display:flex; flex-direction:column; overflow:auto; }
  .panel .chart-wrap { flex:1; position:relative; min-height:0; }
  .panel canvas { position:absolute; inset:0; }

  /* ---------- tables ---------- */
  table.dt { width:100%; border-collapse:collapse; font-size:12px; }
  table.dt thead th { background:var(--navy); color:#fff; font-weight:600;
                      text-align:right; padding:6px 9px; font-size:11.5px;
                      letter-spacing:.2px; white-space:nowrap; }
  table.dt thead th:first-child { text-align:left; }
  table.dt tbody td { padding:5px 9px; text-align:right; border-bottom:1px solid #00294b12;
                      font-variant-numeric:tabular-nums; }
  table.dt tbody td:first-child { text-align:left; font-weight:500; }
  table.dt tbody tr:nth-child(even) { background:var(--gray1); }
  table.dt tbody tr.total td { font-weight:700; border-top:1.5px solid var(--navy);
                               background:var(--bgteal); }
  table.dt.heat tbody tr:nth-child(even) { background:transparent; }
  table.dt.heat th { text-align:center; }
  .panel .pbody.scroll { overflow:auto; }

  /* ---------- source footer ---------- */
  .src { position:absolute; left:46px; right:46px; bottom:14px; font-size:9.5px;
         line-height:1.42; color:var(--gray); }
  .src .ln { margin-top:1px; }

  /* ---------- kpi strip (cover) ---------- */
  .kpis { display:flex; gap:0; border:1px solid #ffffff33; border-radius:6px;
          overflow:hidden; }
  .kpi { flex:1; padding:14px 16px; border-right:1px solid #ffffff22; }
  .kpi:last-child { border-right:none; }
  .kpi .k-label { font-size:10.5px; text-transform:uppercase; letter-spacing:1px;
                  color:#9dc4de; }
  .kpi .k-value { font-family:var(--serif); font-size:26px; font-weight:600;
                  color:#fff; margin-top:3px; }
  .kpi .k-sub { font-size:10px; color:#7fa8c4; margin-top:2px; }

  /* ---------- cover ---------- */
  .slide.cover { padding:0; }
  .cover-inner { position:absolute; inset:0; padding:70px 76px;
                 background:linear-gradient(135deg,#00294b 0%, #003a66 55%, #005f9e 130%);
                 color:#fff; display:flex; flex-direction:column; }
  .cover-eyebrow { font-size:13px; letter-spacing:3px; text-transform:uppercase;
                   color:var(--teall); font-weight:600; }
  .cover-title { font-family:var(--serif); font-size:56px; font-weight:700;
                 line-height:1.08; margin-top:18px; max-width:1050px; }
  .cover-sub { font-size:19px; line-height:1.5; color:#cfe3f2; margin-top:22px;
               max-width:920px; }
  .cover-rating { display:inline-flex; align-items:center; gap:10px; margin-top:26px; }
  .cover-rating .pill { background:var(--teal); color:#fff; font-weight:700;
                        font-size:15px; letter-spacing:1px; padding:6px 16px; border-radius:4px; }
  .cover-spacer { flex:1; }
  .cover-meta { font-size:12px; color:#9dc4de; margin-top:20px; letter-spacing:.3px; }

  /* ---------- footer / progress ---------- */
  .foot { position:absolute; left:0; right:0; bottom:0; height:0; }
  .prog { position:fixed; left:0; right:0; bottom:0; height:26px; z-index:20;
          display:flex; align-items:center; justify-content:space-between;
          padding:0 18px; font-size:11px; color:var(--gray);
          background:rgba(238,240,243,.85); backdrop-filter:blur(3px); }
  .prog .dots { display:flex; gap:4px; }
  .prog .dot { width:6px; height:6px; border-radius:50%; background:#c4ccd3; }
  .prog .dot.on { background:var(--navy); }
  .prog .nav-hint { letter-spacing:.4px; }
  .banner { position:fixed; top:8px; left:8px; z-index:30; background:var(--magenta);
            color:#fff; font-size:11px; font-weight:600; padding:3px 9px; border-radius:3px;
            display:none; }
  .banner.show { display:block; }
  /* data-pending: a bracketed number whose upstream (model_out) hasn't landed */
  .pending { color:var(--magenta); font-weight:700; border-bottom:1.5px dotted var(--magenta);
             cursor:help; }
</style>

<div class="stage"><div class="deck" id="deck"></div></div>
<div class="prog" id="prog">
  <span id="prog-tag">ROP · Buy-Side Evidence</span>
  <div class="dots" id="prog-dots"></div>
  <span class="nav-hint">← / → · slide <span id="prog-num">1</span> / <span id="prog-tot">1</span></span>
</div>
<div class="banner" id="banner">STUB DATA</div>

<script>
/* ============================================================= *
 *  Palette + Chart.js global defaults                            *
 * ============================================================= */
const C = {
  NAVY:'#00294b', NAVY2:'#003a66', BLUE:'#005f9e', BLUE2:'#0075b5',
  TEAL:'#007e6c', TEALL:'#75d9d7', MAGENTA:'#a6256e', WARM:'#ebe0da',
  BGBLUE:'#def5ff', BGTEAL:'#ddf6f6', GRAY:'#6b7f8a', GRAY1:'#f1f1f1'
};
const SERIES = [C.NAVY, C.BLUE, C.TEAL, C.MAGENTA, C.BLUE2, C.TEALL, C.WARM, C.GRAY];

if (window.Chart) {
  Chart.defaults.color = C.NAVY;
  Chart.defaults.borderColor = '#00294b18';
  Chart.defaults.font.family = "'Inter', sans-serif";
  Chart.defaults.font.size = 12;
  Chart.defaults.elements.line.tension = 0;   // straight lines, never curves
  Chart.defaults.elements.point.radius = 3.5;  // visible dots
  Chart.defaults.elements.point.hoverRadius = 5;
  Chart.defaults.plugins.legend.labels.boxWidth = 10;
  Chart.defaults.plugins.legend.labels.font = { size: 11 };
  Chart.defaults.maintainAspectRatio = false;
  Chart.defaults.animation = false;
}

/* ============================================================= *
 *  Component library (EQT-style helpers)                         *
 * ============================================================= */

// pv(value, {pre, suf, dp}) — render a bound number, or a data-pending "•" when
// the value is absent / still the 999 stub sentinel (i.e. awaiting model_out).
function pv(v, opts = {}) {
  if (v === null || v === undefined || v === 999 || v === '999')
    return `<span class="pending" title="awaiting model_out.json">•</span>`;
  let s = (typeof v === 'number' && opts.dp != null) ? v.toFixed(opts.dp) : v;
  return `${opts.pre || ''}${s}${opts.suf || ''}`;
}

// slideHeader(claimHTML, sectionTag, subTag, num)
// claimHTML: full-sentence claim; wrap load-bearing phrases in <u>…</u>.
// sectionTag / subTag: stacked chips top-right (subTag optional).
// num: optional numbered circle badge (thesis-section slides).
function slideHeader(claimHTML, sectionTag, subTag, num) {
  const badge = (num != null && num !== '') ? `<div class="s-badge">${num}</div>` : '';
  const sub = subTag ? `<span class="chip sub">${subTag}</span>` : '';
  const chips = (sectionTag || subTag)
    ? `<div class="chips">${sectionTag ? `<span class="chip main">${sectionTag}</span>` : ''}${sub}</div>`
    : '';
  return `<div class="s-head">
    <div class="lhs">${badge}<div class="s-claim">${claimHTML}</div></div>
    ${chips}
  </div>`;
}

// panel(takeawayHTML, bodyHTML, opts)
// opts: { title, canvasId }  — if canvasId given, bodyHTML is ignored and a
//   chart-wrap+canvas is emitted (init your chart in the slide's init()).
function panel(takeawayHTML, bodyHTML, opts = {}) {
  const title = opts.title ? `<div class="ptitle">${opts.title}</div>` : '';
  const body = opts.canvasId
    ? `<div class="chart-wrap"><canvas id="${opts.canvasId}"></canvas></div>`
    : (bodyHTML || '');
  return `<div class="panel">
    <div class="take">${takeawayHTML}</div>
    ${title}
    <div class="pbody">${body}</div>
  </div>`;
}

// panelRow(panelsHTML[], nCols) — wrap panels in the flex grid.
function panelRow(panelsHTML, nCols) {
  const n = nCols || panelsHTML.length;
  return `<div class="panels cols-${n}">${panelsHTML.join('')}</div>`;
}

// srcFooter(sources[], notes[])
function srcFooter(sources, notes) {
  const s = (sources && sources.length)
    ? `<div class="ln"><b>Source${sources.length>1?'s':''}:</b> ${sources.join('; ')}</div>` : '';
  const n = (notes && notes.length)
    ? notes.map(x => `<div class="ln"><b>Note:</b> ${x}</div>`).join('') : '';
  return `<div class="src">${s}${n}</div>`;
}

// kpiStrip([{label,value,sub}...]) — cover anchor strip.
function kpiStrip(items) {
  return `<div class="kpis">${items.map(k =>
    `<div class="kpi"><div class="k-label">${k.label}</div>
      <div class="k-value">${k.value}</div>
      <div class="k-sub">${k.sub || ''}</div></div>`).join('')}</div>`;
}

// dataTable(cols, rows, opts) — compact financial table.
// opts: { totalRow:true  -> last row styled as total; align:[...] optional }
function dataTable(cols, rows, opts = {}) {
  const head = `<thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>`;
  const body = `<tbody>${rows.map((r, i) => {
    const isTot = opts.totalRow && i === rows.length - 1;
    return `<tr class="${isTot ? 'total' : ''}">${r.map(cell => `<td>${cell}</td>`).join('')}</tr>`;
  }).join('')}</tbody>`;
  return `<table class="dt">${head}${body}</table>`;
}

/* Shared no-curve, no-#000 bar/line option helpers */
function baseScales(yTitle, opts = {}) {
  return {
    x: { grid: { display:false }, ticks: { font:{ size:11 } } },
    y: { grid: { color:'#00294b12' }, ticks: { font:{ size:11 } },
         title: yTitle ? { display:true, text:yTitle, font:{ size:11 }, color:C.GRAY } : {},
         ...(opts.y || {}) }
  };
}

/* ---------- chart factories (all read the generic {labels, series} shape) ---------- */
const el = id => document.getElementById(id);

// bar / grouped bar / stacked bar / horizontal bar
function mkBar(id, cfg = {}) {
  if (!el(id) || !window.Chart) return;
  const series = cfg.series || [];
  const multi = series.length > 1;
  new Chart(el(id), {
    type: 'bar',
    data: {
      labels: cfg.labels || [],
      datasets: series.map((s, i) => ({
        label: s.label || '',
        data: s.data || [],
        backgroundColor: s.color || SERIES[i % SERIES.length],
        borderWidth: 0
      }))
    },
    options: {
      indexAxis: cfg.horizontal ? 'y' : 'x',
      plugins: { legend: { display: multi } },
      scales: {
        x: { stacked: !!cfg.stacked, grid: { display: !!cfg.horizontal, color:'#00294b12' }, ticks: { font:{ size:11 } } },
        y: { stacked: !!cfg.stacked, grid: { color:'#00294b12' }, ticks: { font:{ size:11 } },
             title: cfg.yTitle ? { display:true, text:cfg.yTitle, color:C.GRAY, font:{ size:11 } } : {} }
      }
    }
  });
}

// line / multi-line (straight, dotted points via global defaults)
function mkLine(id, cfg = {}) {
  if (!el(id) || !window.Chart) return;
  const series = cfg.series || [];
  new Chart(el(id), {
    type: 'line',
    data: {
      labels: cfg.labels || [],
      datasets: series.map((s, i) => ({
        label: s.label || '',
        data: s.data || [],
        borderColor: s.color || SERIES[i % SERIES.length],
        backgroundColor: (s.color || SERIES[i % SERIES.length]),
        borderWidth: 2, fill: false
      }))
    },
    options: { plugins: { legend: { display: series.length > 1 } }, scales: baseScales(cfg.yTitle) }
  });
}

// scatter with optional fit line + highlighted point
function mkScatter(id, cfg = {}) {
  if (!el(id) || !window.Chart) return;
  const ds = [{ type:'scatter', label: cfg.peerLabel || 'Peers', data: cfg.points || [],
                backgroundColor: C.BLUE, pointRadius: 4 }];
  if (cfg.fit) ds.push({ type:'line', label:'Fit', data: cfg.fit, borderColor: C.GRAY,
                         borderWidth: 1.5, pointRadius: 0, fill: false });
  if (cfg.highlight) ds.push({ type:'scatter', label: cfg.highlight.label || 'ROP',
                               data: [cfg.highlight], backgroundColor: C.MAGENTA, pointRadius: 6 });
  new Chart(el(id), {
    data: { datasets: ds },
    options: {
      plugins: { legend: { display: true } },
      scales: {
        x: { title: cfg.xTitle ? { display:true, text:cfg.xTitle, color:C.GRAY, font:{ size:11 } } : {},
             grid: { color:'#00294b12' }, ticks: { font:{ size:11 } } },
        y: { title: cfg.yTitle ? { display:true, text:cfg.yTitle, color:C.GRAY, font:{ size:11 } } : {},
             grid: { color:'#00294b12' }, ticks: { font:{ size:11 } } }
      }
    }
  });
}

// heatmap rendered as a colored HTML table (Chart.js has no native matrix).
// g: { colTitle, rowTitle, colLabels:[…], rows:[{label, cells:[num]}] }
function heatmapTable(g = {}) {
  if (!g.rows) return '';
  const flat = g.rows.flatMap(r => r.cells);
  const lo = Math.min(...flat), hi = Math.max(...flat);
  const shade = v => {
    const t = hi === lo ? 0.5 : (v - lo) / (hi - lo);      // 0..1
    // interpolate warm(low) -> teal(high) in the CG palette, no #000
    const a = 0.15 + 0.55 * t;
    return `background:rgba(0,126,108,${a.toFixed(2)});color:${t > 0.6 ? '#fff' : C.NAVY}`;
  };
  const head = `<tr><th></th>${(g.colLabels || []).map(c => `<th>${c}</th>`).join('')}</tr>`;
  const body = g.rows.map(r =>
    `<tr><td style="font-weight:600">${r.label}</td>${r.cells.map(v =>
      `<td style="text-align:center;${shade(v)}">${v}</td>`).join('')}</tr>`).join('');
  return `<table class="dt heat">${g.colTitle ? `<caption style="font-size:10px;color:${C.GRAY};padding-bottom:4px">${g.colTitle}</caption>` : ''}<thead>${head}</thead><tbody>${body}</tbody></table>`;
}

/* buildSlide — declarative slide from a config object.
 * cfg: { claim, section, sub, num, cols, panels:[…], sources, notes }
 * each panel: { take, title, and one of: canvasId | table:{cols,rows} | grid:{…} | body }
 */
function buildSlide(cfg) {
  const panels = (cfg.panels || []).map(p => {
    let body = null;
    if (p.canvasId) return panel(p.take, null, { title: p.title, canvasId: p.canvasId });
    if (p.table) body = dataTable(p.table.cols, p.table.rows, p.tableOpts || {});
    else if (p.grid) body = heatmapTable(p.grid);
    else if (p.body) body = p.body;
    return panel(p.take, body, { title: p.title });
  });
  return slideHeader(cfg.claim, cfg.section, cfg.sub, cfg.num)
    + panelRow(panels, cfg.cols || panels.length)
    + srcFooter(cfg.sources, cfg.notes);
}

/* ============================================================= *
 *  DATA                                                          *
 * ============================================================= */
let DATA = null;
let USING_STUB = false;

async function loadData() {
  try {
    const r = await fetch('data/deck_data.json', { cache:'no-store' });
    if (!r.ok) throw new Error('no real data');
    DATA = await r.json();
  } catch (e) {
    const r2 = await fetch('data/deck_data_STUB.json', { cache:'no-store' });
    DATA = await r2.json();
    USING_STUB = true;
  }
  if (USING_STUB || DATA._stub) document.getElementById('banner').classList.add('show');
}

/* ============================================================= *
 *  SLIDES registry                                              *
 *  Each entry: { title, render(d)->innerHTML, init?(d) }        *
 *  render returns INNER html only (never a wrapped .slide div). *
 *  init() runs after DOM insert — build charts here.            *
 * ============================================================= */
const SLIDES = [

  /* ---- S0 COVER ---- */
  {
    title: 'Cover',
    cover: true,
    render(d) {
      const m = d.meta || {};
      const th = (d.slides && d.slides.s1 && d.slides.s1.theses) || [];
      const heads = ['The software fear is mis-aimed', 'Hardware is a razor/blade compounder', 'A disciplined redeployment machine'];
      const thesisBlock = th.length ? `<div style="display:flex;gap:14px;margin-top:30px">${th.map((t, i) => `
          <div style="flex:1;background:rgba(255,255,255,0.06);border:1px solid #ffffff26;border-radius:7px;padding:13px 15px">
            <div style="display:flex;align-items:baseline;gap:8px">
              <span style="font-family:var(--serif);font-size:22px;font-weight:700;color:#75d9d7">${t.n}</span>
              <span style="font-size:12.5px;font-weight:600;color:#eaf3fb;line-height:1.25">${heads[i] || ''}</span></div>
            <div style="font-size:11.5px;color:#a7cae4;line-height:1.35;margin-top:7px">${(t.eps_impact || '').replace(/^Model:\s*/, '')}</div>
          </div>`).join('')}</div>` : '';
      return `<div class="cover-inner">
        <div class="cover-eyebrow">${m.ticker || 'ROP'} · Roper Technologies · Buy-Side Evidence Deck</div>
        <div class="cover-title">The market is discounting the wrong dollars in Roper's software base.</div>
        <div class="cover-sub">${m.one_line || 'STUB one-line trade thesis.'}</div>
        <div class="cover-rating"><span class="pill">${m.rating || 'BUY'}</span>
          <span style="font-size:14px;color:#cfe3f2">Base PT ${m.price_target != null ? '$'+m.price_target : '—'} (12-mo SOTP) · ${m.tsr_5yr_pct != null ? m.tsr_5yr_pct+'%/yr 5-yr TSR' : ''} · skew ${m.skew || '—'}</span>
        </div>
        <div class="cover-spacer"></div>
        ${thesisBlock}
        <div class="cover-spacer"></div>
        ${kpiStrip(d.cover_kpis || [])}
        <div class="cover-meta">By JAOD &amp; (mainly) Claude · As of ${m.asof || ''} · All figures scripted from data/deck_data.json</div>
      </div>`;
    }
  },

  /* ---- S1 Recommendation one-pager ---- */
  {
    title: 'S1 · Recommendation',
    render(d) {
      const s = sd(d, 's1');
      const theses = (s.theses || []).map(t =>
        `<div style="display:flex;gap:9px;padding:7px 0;border-bottom:1px solid #00294b12">

// safe slide-data accessor
function sd(d, k) { return (d && d.slides && d.slides[k]) || {}; }

// appendix render factory — single table or body panel, cols-1
function appx(key, claim, title, sources, notes) {
  return function (d) {
    const s = sd(d, key);
    const p = s.table
      ? { take: `<b>${title}</b> — full detail underlying the deck.`, title, table: s.table, tableOpts: {} }
      : { take: `<b>${title}</b>.`, title, body: `<div style="font-size:13px;line-height:1.7">${s.body || ''}</div>` };
    // large tables scroll inside the panel body
    return buildSlide({ claim, section: 'Appendix', sub: title, panels: [p], cols: 1, sources, notes });
  };
}

/* ============================================================= *
 *  Render + navigation                                          *
 * ============================================================= */
let cur = 0;

function renderAll() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  SLIDES.forEach((entry, i) => {
    const s = document.createElement('div');
    s.className = 'slide' + (i === 0 ? ' active' : '') + (entry.cover ? ' cover' : '');
    if (entry.todo || typeof entry.render !== 'function') {
      s.innerHTML = todoRender(entry);
    } else {
      s.innerHTML = entry.render(DATA);   // returns INNER html only
    }
    deck.appendChild(s);
  });
  // run init() for chart slides after DOM is in place
  SLIDES.forEach((entry, i) => {
    if (typeof entry.init === 'function') { try { entry.init(DATA); } catch (e) { console.error('init slide', i, e); } }
  });
  buildDots();
  updateChrome();
}

function buildDots() {
  const dots = document.getElementById('prog-dots');
  dots.innerHTML = SLIDES.map((_, i) => `<span class="dot" data-i="${i}"></span>`).join('');
  document.getElementById('prog-tot').textContent = SLIDES.length;
  dots.querySelectorAll('.dot').forEach(d =>
    d.addEventListener('click', () => go(+d.dataset.i)));
}

function updateChrome() {
  document.querySelectorAll('.prog .dot').forEach((d, i) =>
    d.classList.toggle('on', i === cur));
  document.getElementById('prog-num').textContent = cur + 1;
  document.getElementById('prog-tag').textContent =
    `ROP · ${SLIDES[cur].title || ('Slide '+(cur+1))}`;
}

function go(i) {
  if (i < 0 || i >= SLIDES.length || i === cur) return;
  const slides = document.querySelectorAll('.slide');
  slides[cur].classList.remove('active');
  cur = i;
  slides[cur].classList.add('active');
  location.hash = '#' + (cur + 1);
  updateChrome();
}

function jumpFromHash() {
  const n = parseInt((location.hash || '').replace('#', ''), 10);
  if (!isNaN(n) && n >= 1 && n <= SLIDES.length) go(n - 1);
}

addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); go(cur + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(cur - 1); }
  else if (e.key === 'Home') go(0);
  else if (e.key === 'End') go(SLIDES.length - 1);
});
addEventListener('hashchange', jumpFromHash);

/* ============================================================= *
 *  Fixed-canvas scale-to-fit                                    *
 * ============================================================= */
function fitDeck() {
  const margin = 24;
  const sx = (innerWidth  - margin * 2) / 1440;
  const sy = (innerHeight - margin * 2 - 26) / 900;  // 26 = progress bar
  const s = Math.min(sx, sy, 1);                      // never upscale past 1
  document.getElementById('deck').style.transform = `scale(${s})`;
}
addEventListener('resize', fitDeck);

/* ============================================================= *
 *  Boot                                                         *
 * ============================================================= */
loadData().then(() => {
  renderAll();
  fitDeck();
  jumpFromHash();
});
